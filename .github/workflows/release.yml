name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-X main.version=${{ github.ref_name }}" -o "swat${EXT}" .

      - name: Package (tar.gz for unix)
        if: matrix.goos != 'windows'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PLATFORM="${{ matrix.goos }}-${{ matrix.goarch }}"
          TARBALL="swat-${TAG}-${PLATFORM}.tar.gz"

          mkdir -p staging/plugin staging/skill staging/blueprints/squads/_framework

          cp swat staging/
          cp plugin/index.ts plugin/package.json plugin/openclaw.plugin.json staging/plugin/
          cp skill/SKILL.md staging/skill/
          cp blueprints/OPERATION.md staging/blueprints/
          cp blueprints/squads/_framework/* staging/blueprints/squads/_framework/

          cd staging
          tar -czf "../${TARBALL}" .

      - name: Package (zip for windows)
        if: matrix.goos == 'windows'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PLATFORM="${{ matrix.goos }}-${{ matrix.goarch }}"
          ZIPFILE="swat-${TAG}-${PLATFORM}.zip"

          mkdir -p staging/plugin staging/skill staging/blueprints/squads/_framework

          cp swat.exe staging/
          cp plugin/index.ts plugin/package.json plugin/openclaw.plugin.json staging/plugin/
          cp skill/SKILL.md staging/skill/
          cp blueprints/OPERATION.md staging/blueprints/
          cp blueprints/squads/_framework/* staging/blueprints/squads/_framework/

          cd staging
          zip -r "../${ZIPFILE}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: swat-${{ matrix.goos }}-${{ matrix.goarch }}
          path: swat-*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            swat-*.tar.gz
            swat-*.zip
