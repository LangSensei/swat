name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o swat .

      - name: Package tarball
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PLATFORM="${{ matrix.goos }}-${{ matrix.goarch }}"
          TARBALL="swat-${TAG}-${PLATFORM}.tar.gz"

          mkdir -p staging/plugin staging/skill staging/blueprints/_framework

          cp swat staging/
          cp plugin/index.ts plugin/package.json plugin/openclaw.plugin.json staging/plugin/
          cp skill/SKILL.md staging/skill/
          cp blueprints/OPERATION.md staging/blueprints/
          cp blueprints/_framework/* staging/blueprints/_framework/

          cd staging
          tar -czf "../${TARBALL}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: swat-${{ matrix.goos }}-${{ matrix.goarch }}
          path: swat-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: swat-*.tar.gz
